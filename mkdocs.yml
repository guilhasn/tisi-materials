site_name: TISI - Tratamento de Incidentes de Seguranca Informatica
site_description: Materiais praticos de apoio a UC TISI - MCIF - IPLeiria
site_author: IPLeiria - MCIF

theme:
  name: material
  custom_dir: overrides
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

nav:
  - Inicio: index.md
  - Business Impact Analysis:
    - Metricas BIA: bia/metricas.md
    - Casos Praticos: bia/casos-praticos.md
    - Exercicios: bia/exercicios.md
    - Calculadora Interativa: bia/calculadora.md
  - Incident Response Plan:
    - Fundamentos: irp/index.md
  - Disaster Recovery Plan: drp/index.md
  - Business Continuity Plan: bcp/index.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/bia-calculadora.js

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
