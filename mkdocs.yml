site_name: TISI - Tratamento de Incidentes de Segurança Informática
site_description: Materiais práticos de apoio à UC TISI - MCIF - IPLeiria
site_author: IPLeiria - MCIF

theme:
  name: material
  custom_dir: overrides
  language: pt
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Modo escuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Modo claro
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs.link
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

nav:
  - Início: index.md
  - 📊 BIA:
    - bia/index.md
    - Métricas BIA: bia/metricas.md
    - Casos Práticos: bia/casos-praticos.md
    - Exercícios: bia/exercicios.md
    - Calculadora Interativa: bia/calculadora.md
  - 🚨 IRP:
    - irp/index.md
    - Planeamento: irp/planeamento.md
    - Deteção: irp/detecao.md
    - Reação: irp/reacao.md
    - Recuperação: irp/recuperacao.md
    - Casos Práticos: irp/casos-praticos.md
  - 💾 DRP:
    - drp/index.md
    - Estratégias de Recuperação: drp/estrategias.md
    - Gestão de Crise: drp/gestao-crise.md
    - Testes e Manutenção: drp/testes.md
    - Casos Práticos: drp/casos-praticos.md
  - 🏢 BCP:
    - bcp/index.md
    - Estratégias de Continuidade: bcp/estrategias.md
    - Implementação e Operações: bcp/implementacao.md
    - Testes e Manutenção: bcp/testes.md
    - Normas e Frameworks: bcp/normas.md
    - Casos Práticos: bcp/casos-praticos.md
  - 🔥 Incident Handling:
    - ih/index.md
    - Frameworks de IR: ih/frameworks.md
    - Preparação: ih/preparacao.md
    - Deteção, Contenção e Investigação: ih/detecao-contencao.md
    - Erradicação, Recuperação e Follow-up: ih/erradicacao-recuperacao.md
    - Casos Práticos: ih/casos-praticos.md
  - 📋 Templates: modelos/index.md
  - 📚 Recursos:
    - Mapa MITRE ATT&CK: comum/attack-mapping.md

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/bia-calculadora.js

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
